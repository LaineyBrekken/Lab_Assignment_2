        <main class="container mt-5">
            <iframe width="520" height="400" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" id="gmap_canvas" src="https://maps.google.com/maps?width=520&amp;height=400&amp;hl=en&amp;q=%20+(Moscow,ID)&amp;t=&amp;z=12&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"></iframe> <a href='https://www.krankenversicherungsvergleich.at/'>Krankenversicherungsvergleich online</a> <script type='text/javascript' src='https://embedmaps.com/google-maps-authorization/script.js?id=df202a2e237e6051bcd518401a7cb86a8abd6d80'></script>
            <p>Want to get in contact? Fill out the form below!</p>
            <h1>Contact</h1>
            <form action="mailto:your.email" method="post" enctype="text/plain"> 
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="First & Last Name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="youremail@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </form>
        </main>
